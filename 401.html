<script>
window.Webflow = window.Webflow || [];
window.Webflow.push(function () {
  if (!window.gsap || !window.jQuery) return;

  /* =========================================================
     FLAVORS NAV DROPDOWN
     ADJUSTMENT:
     - When closing (hover-off / click-off), fade the
       .list-wrapper border color to transparent BEFORE
       the dropdown fully hides so it doesn�t disappear abruptly.
     - Everything else remains unchanged.
  ========================================================= */

  var $doc = $(document);

  var TOGGLE_SEL = ".nav-dropdown-products";
  var LIST_SEL   = ".nav-list";
  var BG_SEL     = ".nav-dropdown-background";
  var ITEM_SEL   = ".flavor-grid-block";
  var LINE_SEL   = ".nav-line";
  var SOCIAL_SEL = ".social-group";
  var WRAP_SEL   = ".list-wrapper";

  var BG_DUR        = 0.32;
  var ITEMS_IN_DUR  = 0.22;
  var ITEMS_OUT_DUR = 0.18;
  var STAGGER_EACH  = 0.06;
  var Y_OFFSET      = 16;

  var BORDER_FADE_DUR = 0.18;
  var HOVER_OUT_MS    = 120;

  var closeTimer = null;
  var instances = [];

  function buildInstances() {
    instances = [];

    $(".nav-wrapper").each(function () {
      var $nav = $(this);

      var $toggle = $nav.find(TOGGLE_SEL).first();
      var $list   = $nav.find(LIST_SEL).first();
      var $wrap   = $list.find(WRAP_SEL).first();

      var $bg     = $list.find(BG_SEL).first();
      var $items  = $list.find(ITEM_SEL);
      var $line   = $list.find(LINE_SEL).first();
      var $social = $list.find(SOCIAL_SEL).first();

      if (!$toggle.length || !$list.length || !$bg.length || !$items.length) return;

      var originalBorderColor = $wrap.css("border-color");

      gsap.set($list, { display: "none", pointerEvents: "none" });
      gsap.set($bg, { transformOrigin: "50% 0%", scaleY: 0 });
      gsap.set($items, { opacity: 0, y: Y_OFFSET, pointerEvents: "none" });
      if ($line.length) gsap.set($line, { opacity: 0, y: 10, visibility: "hidden" });
      if ($social.length) gsap.set($social, { opacity: 0, y: 10, visibility: "hidden" });

      var tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power2.out" }
      });

      tl.set($list, { display: "block", pointerEvents: "auto" }, 0);

      tl.to($bg, { scaleY: 1, duration: BG_DUR }, 0);

      tl.to(
        $items,
        {
          opacity: 1,
          y: 0,
          duration: ITEMS_IN_DUR,
          stagger: { each: STAGGER_EACH },
          onStart: () => gsap.set($items, { pointerEvents: "auto" })
        },
        0.1
      );

      if ($line.length) {
        tl.to(
          $line,
          { opacity: 0.55, y: 0, visibility: "visible", duration: 0.16 },
          ">"
        );
      }

      if ($social.length) {
        tl.to(
          $social,
          { opacity: 1, y: 0, visibility: "visible", duration: 0.16 },
          ">"
        );
      }

      tl.eventCallback("onReverseComplete", function () {
        gsap.set($items, { pointerEvents: "none" });
        if ($line.length) gsap.set($line, { visibility: "hidden", opacity: 0, y: 10 });
        if ($social.length) gsap.set($social, { visibility: "hidden", opacity: 0, y: 10 });

        gsap.set($bg, { scaleY: 0 });
        gsap.set($wrap, { borderColor: originalBorderColor });
        gsap.set($list, { display: "none", pointerEvents: "none" });
      });

      instances.push({
        $toggle,
        $list,
        $wrap,
        tl,
        isOpen: false,
        borderColor: originalBorderColor
      });
    });
  }

  function open(inst) {
    if (!inst || inst.isOpen) return;
    inst.isOpen = true;

    gsap.set(inst.$wrap, { borderColor: inst.borderColor });
    inst.tl.play(0);
  }

  function close(inst) {
    if (!inst || !inst.isOpen) return;
    inst.isOpen = false;

    gsap.to(inst.$wrap, {
      borderColor: "rgba(0,0,0,0)",
      duration: BORDER_FADE_DUR,
      ease: "power1.out"
    });

    inst.tl.reverse();
  }

  function closeAll() {
    instances.forEach(close);
  }

  function scheduleCloseAll() {
    if (closeTimer) clearTimeout(closeTimer);
    closeTimer = setTimeout(function () {
      var hovering = instances.some(inst =>
        inst.$toggle.is(":hover") || inst.$list.is(":hover")
      );
      if (!hovering) closeAll();
    }, HOVER_OUT_MS);
  }

  buildInstances();
  setTimeout(buildInstances, 0);

  $doc.on("click", TOGGLE_SEL, function (e) {
    e.preventDefault();
    e.stopPropagation();

    var inst = instances.find(i => i.$toggle[0] === this);
    if (!inst) return;

    inst.isOpen ? close(inst) : open(inst);
  });

  $doc.on("click", LIST_SEL, e => e.stopPropagation());
  $doc.on("click", closeAll);

  $doc.on("mouseleave", TOGGLE_SEL + ", " + LIST_SEL, scheduleCloseAll);
  $doc.on("mouseenter", TOGGLE_SEL + ", " + LIST_SEL, function () {
    if (closeTimer) clearTimeout(closeTimer);
  });

  $doc.on("keydown", e => {
    if (e.key === "Escape") closeAll();
  });
});
</script>

          right: "",
          color: "",
          zIndex: ""
        });
      }
    }

    function setClosedStates() {
      gsap.set(menuLinkEl, { opacity: 0, y: 12, scale: 1, transformOrigin: "50% 50%" });
      if (navLineEl.length) gsap.set(navLineEl, { opacity: 0, y: 10, visibility: "hidden" });
      if (socialGroupEl.length) gsap.set(socialGroupEl, { opacity: 0, y: 10, visibility: "hidden" });
    }

    setClosedStates();
    gsap.set(menuWrapEl, { display: "none" });
    gsap.set(menuBaseEl, { opacity: 0 });

    // Page-load text state
    setMenuTextState(false);

    function flip(forwards) {
      let state = Flip.getState(flipItemEl);
      flipItemEl.appendTo(forwards ? menuContainEl : hamburgerEl);
      Flip.from(state, { duration: flipDuration });
    }

    let tl = gsap.timeline({ paused: true });

    // Force hidden states before menu becomes visible (prevents flash)
    tl.set(menuLinkEl, { opacity: 0, y: 12, scale: 1 }, 0);
    if (navLineEl.length) tl.set(navLineEl, { opacity: 0, y: 10, visibility: "hidden" }, 0);
    if (socialGroupEl.length) tl.set(socialGroupEl, { opacity: 0, y: 10, visibility: "hidden" }, 0);

    tl.set(menuWrapEl, { display: "flex" }, 0);

    tl.fromTo(
      menuBaseEl,
      { opacity: 0 },
      {
        opacity: 1,
        duration: flipDuration,
        ease: "none",
        onStart: () => {
          setMenuTextState(true);
          flip(true);
        }
      },
      0
    );

    // Menu links (staggered)
    tl.fromTo(
      menuLinkEl,
      { opacity: 0, y: 12, scale: 1 },
      {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: linksDuration,
        stagger: { each: linksEach },
        immediateRender: false
      },
      linksStart
    );

    // Nav line AFTER all links (55% opacity)
    if (navLineEl.length) {
      tl.fromTo(
        navLineEl,
        { opacity: 0, y: 10, visibility: "hidden" },
        {
          opacity: 0.55,
          y: 0,
          visibility: "visible",
          duration: lineDuration,
          immediateRender: false
        },
        ">"
      );
    }

    // Social group AFTER line
    if (socialGroupEl.length) {
      tl.fromTo(
        socialGroupEl,
        { opacity: 0, y: 10, visibility: "hidden" },
        {
          opacity: 1,
          y: 0,
          visibility: "visible",
          duration: socialDuration,
          immediateRender: false
        },
        ">"
      );
    }

    tl.eventCallback("onReverseComplete", function () {
      flip(false);
      setMenuTextState(false);
      gsap.set(menuWrapEl, { display: "none" });
      setClosedStates();
    });

    function openMenu(open) {
      if (tl.isActive()) return;

      if (open) {
        setClosedStates();
        gsap.set(menuBaseEl, { opacity: 0 });
        gsap.set(menuWrapEl, { display: "flex" });
        tl.play(0);
        hamburgerEl.addClass("nav-open");
      } else {
        tl.reverse();
        hamburgerEl.removeClass("nav-open");
      }
    }

    // Hamburger click toggles menu
    hamburgerEl.on("click", function (e) {
      e.preventDefault();
      openMenu(!hamburgerEl.hasClass("nav-open"));
    });

    // Close interactions
    menuBaseEl.on("mouseenter", function () {
      openMenu(false);
    });

    menuBaseEl.on("click", function (e) {
      e.preventDefault();
      openMenu(false);
    });

    $(document).on("keydown", function (e) {
      if (e.key === "Escape") openMenu(false);
    });

    /* === SMOOTH SCALE HOVER FOR MENU LINKS === */
    menuLinkEl.each(function () {
      let el = this;

      el.addEventListener("mouseenter", () => {
        gsap.to(el, {
          scale: hoverScale,
          duration: hoverSpeed,
          ease: "power2.out",
          overwrite: "auto"
        });
      });

      el.addEventListener("mouseleave", () => {
        gsap.to(el, {
          scale: 1,
          duration: hoverSpeed,
          ease: "power2.out",
          overwrite: "auto"
        });
      });
    });
  });
});
</script>
</body></html>
